name: ready_sg
description: Emergency learning and response mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # Backend & Database
  supabase_flutter: ^2.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^13.2.5

  # Networking
  connectivity_plus: ^5.0.2

  # Maps & Location
  flutter_map: ^6.2.1
  flutter_map_marker_cluster: ^1.3.6
  latlong2: ^0.9.0
  geolocator: ^11.1.0

  # Notifications
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

  # Video
  youtube_player_iframe: ^4.0.1

  # Shimmer loading animations
  shimmer: ^3.0.0

  # Utilities
  url_launcher: ^6.2.5
  json_annotation: ^4.9.0

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  # Assets configuration
  assets:
    - .env.example
    - assets/images/
    - assets/images/lessons/

  # Fonts configuration (placeholder - will add actual fonts later)
  # fonts:
